<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Makeup Review System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #E8D5F5 0%, #D8F0E8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 35px;
            padding: 45px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(155, 123, 181, 0.2);
        }
        .logo { text-align: center; font-size: 55px; margin-bottom: 15px; }
        h2 { text-align: center; color: #6B4B8B; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #7B5B9B; font-weight: 600; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #E8D5F5;
            border-radius: 25px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #9B7BB5;
            box-shadow: 0 0 0 3px rgba(155, 123, 181, 0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9B7BB5 0%, #7B5B9B 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(155, 123, 181, 0.4);
        }
        .flash {
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .flash.success {
            background: #D8F0E8;
            color: #4A8B7A;
            border-left: 4px solid #4A8B7A;
        }
        .flash.error {
            background: #FFE4E4;
            color: #D46B6B;
            border-left: 4px solid #D46B6B;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #9B7BB5;
        }
        .login-link a {
            color: #7B5B9B;
            text-decoration: none;
            font-weight: 600;
        }
        .password-hint {
            font-size: 0.75em;
            color: #9B7BB5;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💜📝</div>
        <h2>Create Account</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>👤 Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
                <div class="password-hint">🔐 Minimum 8 characters</div>
            </div>
            
            <div class="form-group">
                <label>✓ Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm your password" required>
            </div>
            
            <button type="submit">💖 Register 💜</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</body>
</html>
