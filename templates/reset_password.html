<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #E8D5F5 0%, #D8F0E8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 35px;
            padding: 45px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }
        h2 { color: #6B4B8B; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #7B5B9B; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E8D5F5;
            border-radius: 25px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #9B7BB5 0%, #7B5B9B 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
        }
        .flash {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .flash.success { background: #D8F0E8; color: #4A8B7A; }
        .flash.error { background: #FFE4E4; color: #D46B6B; }
        .hint { font-size: 12px; color: #9B7BB5; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔑 Reset Password</h2>
        <p>Create a new password for your account</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Enter new password" required>
                <div class="hint">Minimum 4 characters</div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm new password" required>
            </div>
            <button type="submit">Reset Password</button>
        </form>
    </div>
</body>
</html>
